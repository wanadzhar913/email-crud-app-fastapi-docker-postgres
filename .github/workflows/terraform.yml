name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: terraform/deploy
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/deploy
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.AWS_ROLE_ARN != '' && secrets.AWS_REGION != '' && secrets.TF_STATE_BUCKET != '' }}
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub secrets format
        run: |
          if ! echo "$AWS_REGION" | grep -qE '^[a-z]{2}-[a-z]+-[0-9]+$'; then
            echo "::error::AWS_REGION secret must look like ap-southeast-5 (no quotes, no spaces)."
            echo "Got length $(echo -n "$AWS_REGION" | wc -c) characters."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Terraform Init
        working-directory: terraform/deploy
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform/deploy
        env:
          TF_VAR_github_repository: ${{ github.repository }}
        run: terraform plan -input=false -no-color
